<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Liga Pontos Fácil | Jogo Infantil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-wrapper">
    <div class="game-panel">
        <div class="stats">
            <div class="stat-badge">🌟 FASE <span class="stat-number" id="levelNum">1</span></div>
            <div class="stat-badge">✨ FLUXOS <span class="stat-number" id="flowsDone">0</span><span>/5</span></div>
            <div class="stat-badge">🎨 COBERTURA <span class="stat-number" id="coverage">0</span><span>%</span></div>
        </div>

        <div id="gridContainer" class="grid"></div>

        <!-- Paleta de cores -->
        <div class="color-palette" id="colorPalette"></div>

        <div class="action-buttons">
            <button class="btn" id="prevBtn">◀ FASE ANTERIOR</button>
            <button class="btn btn-reset" id="resetBtn">🔄 RECOMEÇAR</button>
            <button class="btn" id="nextBtn">PRÓXIMA FASE ▶</button>
        </div>
        <button class="btn btn-clear" id="clearPathsBtn">🧽 APAGAR MEU CAMINHO</button>
        <div id="messageBox" class="message-area">🌈 1. Toque numa cor. 2. Toque numa célula vizinha ao pontinho para desenhar o caminho!</div>
        <footer>⭐ Só pode pintar ao lado de células da mesma cor. Não pode cruzar outras cores.</footer>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
