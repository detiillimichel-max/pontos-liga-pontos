<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Liga Pontos sem Bloqueio | Jogo Infantil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-wrapper">
    <div class="game-panel">
        <div class="stats">
            <div class="stat-badge">🌟 FASE <span class="stat-number" id="levelNum">1</span></div>
            <div class="stat-badge">✨ FLUXOS <span class="stat-number" id="flowsDone">0</span><span>/5</span></div>
            <div class="stat-badge">🧩 COBERTURA <span class="stat-number" id="coverage">0</span><span>%</span></div>
        </div>

        <div id="gridContainer" class="grid"></div>

        <div class="action-buttons">
            <button class="btn" id="prevBtn">◀ FASE ANTERIOR</button>
            <button class="btn btn-reset" id="resetBtn">🔄 RECOMEÇAR FASE</button>
            <button class="btn" id="nextBtn">PRÓXIMA FASE ▶</button>
        </div>
        <div id="messageBox" class="message-area">🌈 Toque num pontinho ★ e depois no outro da mesma cor! O jogo só permite se não atrapalhar as outras cores.</div>
        <footer>⭐ O jogo impede caminhos que bloqueiam outras cores. Experimente conectar em outra ordem!</footer>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
